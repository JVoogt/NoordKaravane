http:
  routers:
    noordkaravane:
      rule: "Host(`noordkaravane.co.za`) || Host(`www.noordkaravane.co.za`)"
      entryPoints:
        - websecure
      service: noordkaravane
      tls:
        certResolver: letsencrypt
  services:
    noordkaravane:
      loadBalancer:
        servers:
          - url: "http://192.168.0.120:8260"
