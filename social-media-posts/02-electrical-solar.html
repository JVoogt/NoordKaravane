<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>Noord Karavane - Electrical & Solar Installations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1f1f1f;
            --navy-dark: #141414;
            --orange: #e85d04;
            --orange-bright: #ff6b0a;
            --yellow: #ffc107;
            --black: #0a0a0a;
            --white: #ffffff;
            --cream: #f5f2ed;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy);
        }

        .canvas {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, var(--navy-dark) 0%, var(--navy) 50%, #0a0a0a 100%);
        }

        /* Sun rays effect */
        .sun-rays {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 193, 7, 0.1) 10deg,
                transparent 20deg,
                transparent 30deg,
                rgba(255, 193, 7, 0.1) 40deg,
                transparent 50deg,
                transparent 60deg,
                rgba(255, 193, 7, 0.1) 70deg,
                transparent 80deg,
                transparent 90deg,
                rgba(255, 193, 7, 0.1) 100deg,
                transparent 110deg,
                transparent 120deg,
                rgba(255, 193, 7, 0.1) 130deg,
                transparent 140deg,
                transparent 150deg,
                rgba(255, 193, 7, 0.1) 160deg,
                transparent 170deg,
                transparent 180deg
            );
            opacity: 0.6;
        }

        /* Grid pattern overlay */
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image:
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Orange accent bar */
        .accent-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, var(--yellow) 0%, var(--orange) 50%, var(--orange-bright) 100%);
        }

        /* Logo section */
        .logo-section {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .logo {
            width: 240px;
            height: 240px;
        }

        /* Solar panel graphic */
        .solar-graphic {
            position: absolute;
            top: 320px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .solar-icon {
            width: 100px;
            height: 100px;
        }

        .bolt-icon {
            width: 60px;
            height: 60px;
            fill: var(--yellow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        /* Content section */
        .content {
            position: absolute;
            top: 460px;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 60px;
        }

        .headline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 68px;
            color: var(--white);
            letter-spacing: 4px;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .headline span {
            color: var(--yellow);
        }

        .subheadline {
            font-size: 26px;
            color: var(--cream);
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 25px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
            font-size: 20px;
            font-weight: 600;
        }

        .feature-dot {
            width: 12px;
            height: 12px;
            background: var(--orange);
            border-radius: 50%;
        }

        /* Contact section */
        .contact-section {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            padding: 0 60px;
        }

        .contact-bar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--white);
            font-size: 21px;
            font-weight: 600;
        }

        .contact-item svg {
            width: 22px;
            height: 22px;
            fill: var(--yellow);
        }

        .whatsapp-cta {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: var(--white);
            padding: 18px 32px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .whatsapp-cta svg {
            width: 28px;
            height: 28px;
            fill: var(--white);
        }

        /* Bottom accent */
        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--orange-bright) 0%, var(--yellow) 100%);
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="sun-rays"></div>
        <div class="grid-pattern"></div>
        <div class="accent-bar"></div>

        <div class="logo-section">
            <img src="logo-white.png" alt="Noord Karavane" class="logo">
        </div>

        <div class="solar-graphic">
            <svg class="solar-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="16" width="56" height="36" rx="2" stroke="#ffc107" stroke-width="3" fill="none"/>
                <line x1="4" y1="28" x2="60" y2="28" stroke="#ffc107" stroke-width="2"/>
                <line x1="4" y1="40" x2="60" y2="40" stroke="#ffc107" stroke-width="2"/>
                <line x1="18" y1="16" x2="18" y2="52" stroke="#ffc107" stroke-width="2"/>
                <line x1="32" y1="16" x2="32" y2="52" stroke="#ffc107" stroke-width="2"/>
                <line x1="46" y1="16" x2="46" y2="52" stroke="#ffc107" stroke-width="2"/>
                <rect x="28" y="52" width="8" height="8" fill="#ffc107"/>
            </svg>
            <svg class="bolt-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.07-.12C8.48 10.94 10.42 7.54 13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21z"/>
            </svg>
            <svg class="solar-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="16" width="56" height="36" rx="2" stroke="#e85d04" stroke-width="3" fill="none"/>
                <line x1="4" y1="28" x2="60" y2="28" stroke="#e85d04" stroke-width="2"/>
                <line x1="4" y1="40" x2="60" y2="40" stroke="#e85d04" stroke-width="2"/>
                <line x1="18" y1="16" x2="18" y2="52" stroke="#e85d04" stroke-width="2"/>
                <line x1="32" y1="16" x2="32" y2="52" stroke="#e85d04" stroke-width="2"/>
                <line x1="46" y1="16" x2="46" y2="52" stroke="#e85d04" stroke-width="2"/>
                <rect x="28" y="52" width="8" height="8" fill="#e85d04"/>
            </svg>
        </div>

        <div class="content">
            <h1 class="headline">Electrical & <span>Solar</span><br>Installations</h1>
            <p class="subheadline">Power Your Adventures Off-Grid</p>
            <div class="features">
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Solar Panels</span>
                </div>
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Battery Systems</span>
                </div>
                <div class="feature">
                    <div class="feature-dot"></div>
                    <span>Full Rewiring</span>
                </div>
            </div>
        </div>

        <div class="contact-section">
            <div class="contact-bar">
                <div class="contact-info">
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <span>252 General Beyers, Pretoria North</span>
                    </div>
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        <span>083 334 9357</span>
                    </div>
                </div>
                <div class="whatsapp-cta">
                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    WhatsApp Us
                </div>
            </div>
        </div>

        <div class="bottom-accent"></div>
    </div>
</body>
</html>
