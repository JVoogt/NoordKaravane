<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>Noord Karavane - Adventure Awaits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1f1f1f;
            --navy-dark: #0a0a0a;
            --navy-light: #2a2a2a;
            --orange: #e85d04;
            --orange-bright: #ff6b0a;
            --sunset-pink: #ff8a5b;
            --sunset-yellow: #ffc857;
            --black: #0a0a0a;
            --white: #ffffff;
            --cream: #f5f2ed;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy-dark);
        }

        .canvas {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg,
                var(--sunset-yellow) 0%,
                var(--orange) 15%,
                var(--sunset-pink) 30%,
                var(--navy) 50%,
                var(--navy-dark) 100%
            );
        }

        /* Sun circle */
        .sun {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--sunset-yellow) 0%, var(--orange) 70%, transparent 100%);
            border-radius: 50%;
            opacity: 0.9;
        }

        /* Mountain silhouette */
        .mountains {
            position: absolute;
            top: 500px;
            left: 0;
            width: 100%;
            height: 400px;
        }

        .mountain-svg {
            width: 100%;
            height: 100%;
        }

        /* Road lines */
        .road {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 700px;
            background: linear-gradient(180deg,
                transparent 0%,
                var(--navy-dark) 20%,
                var(--black) 100%
            );
        }

        .road-lines {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 400px;
            background: repeating-linear-gradient(
                180deg,
                var(--sunset-yellow) 0px,
                var(--sunset-yellow) 40px,
                transparent 40px,
                transparent 80px
            );
            opacity: 0.6;
        }

        /* Logo section - large and centered */
        .logo-section {
            position: absolute;
            top: 550px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .logo {
            width: 380px;
            height: 380px;
            filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
        }

        /* Tagline */
        .tagline-section {
            position: absolute;
            top: 970px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .tagline {
            font-family: 'Caveat', cursive;
            font-size: 72px;
            color: var(--sunset-yellow);
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .tagline-sub {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: var(--white);
            letter-spacing: 6px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Services list */
        .services {
            position: absolute;
            top: 1150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        .service-item {
            font-family: 'Barlow', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--white);
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .service-item span {
            color: var(--orange);
            margin: 0 15px;
        }

        /* Contact section */
        .contact-section {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            padding: 0 60px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .contact-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--orange);
            letter-spacing: 4px;
            margin-bottom: 25px;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--white);
            font-size: 26px;
            font-weight: 600;
        }

        .contact-item svg {
            width: 28px;
            height: 28px;
            fill: var(--orange);
        }

        .whatsapp-cta {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: var(--white);
            padding: 24px 50px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .whatsapp-cta svg {
            width: 36px;
            height: 36px;
            fill: var(--white);
        }

        /* Top accent */
        .top-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--sunset-yellow) 0%, var(--orange) 50%, var(--sunset-pink) 100%);
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="top-accent"></div>
        <div class="sun"></div>

        <div class="mountains">
            <svg class="mountain-svg" viewBox="0 0 1080 400" preserveAspectRatio="none">
                <polygon fill="#1f1f1f" points="0,400 200,150 400,300 540,100 700,250 850,80 1080,300 1080,400"/>
                <polygon fill="#141414" points="0,400 100,250 300,350 500,200 700,320 900,180 1080,350 1080,400"/>
            </svg>
        </div>

        <div class="road">
            <div class="road-lines"></div>
        </div>

        <div class="logo-section">
            <img src="logo-white.png" alt="Noord Karavane" class="logo">
        </div>

        <div class="tagline-section">
            <p class="tagline">Adventure Awaits</p>
            <p class="tagline-sub">We'll Get You There</p>
        </div>

        <div class="services">
            <div class="service-item">Service & Repairs <span>|</span> Electrical & Solar <span>|</span> Safety Checks</div>
        </div>

        <div class="contact-section">
            <div class="contact-card">
                <h3 class="contact-title">Find Us</h3>
                <div class="contact-details">
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <span>252 General Beyers, Pretoria North</span>
                    </div>
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        <span>083 334 9357</span>
                    </div>
                </div>
                <div class="whatsapp-cta">
                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    WhatsApp Us
                </div>
            </div>
        </div>
    </div>
</body>
</html>
